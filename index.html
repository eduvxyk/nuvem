<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuvem Chovendo Letras - Blur Azul</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(to bottom, #0a1428, #1e3a6b 60%, #0a1f3d);
      height: 100vh;
    }

    canvas {
      display: block;
    }

    .nuvem {
      position: absolute;
      top: 35px;
      left: 50%;
      font-size: 260px;
      color: #f5f8ff;
      text-shadow: 
        0 0 25px #ffffff,
        0 0 60px #aaccff;
      transform: translateX(-50%);
      z-index: 10;
      pointer-events: none;
      animation: flutuar 18s ease-in-out infinite;
      user-select: none;
    }

    @keyframes flutuar {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-25px); }
    }
  </style>
</head>
<body>

  <div class="nuvem">☁️</div>
  
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let width = window.innerWidth;
    let height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;

    window.addEventListener('resize', () => {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    });

    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz!?";
    const particles = [];

    class Particle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.char = letters[Math.floor(Math.random() * letters.length)];
        this.speed = 2.7 + Math.random() * 2.6;
        this.size = 18;
      }

      update() {
        this.y += this.speed;
      }

      draw() {
        ctx.font = `${this.size}px monospace`;
        ctx.fillStyle = '#bbddff';
        ctx.fillText(this.char, this.x, this.y);
      }
    }

    function createRainFromCloud() {
      const cloudX = width / 2;
      const cloudY = 185;

      if (Math.random() < 0.37) {
        const offsetX = (Math.random() - 0.5) * 230;
        const particle = new Particle(cloudX + offsetX, cloudY + Math.random() * 48);
        particles.push(particle);
      }
    }

    function drawBlueBlur() {
      // Blur azul suave embaixo da nuvem (gradiente vertical)
      const gradient = ctx.createLinearGradient(0, height * 0.55, 0, height);
      gradient.addColorStop(0, 'rgba(80, 140, 220, 0)');
      gradient.addColorStop(0.4, 'rgba(70, 130, 210, 0.08)');
      gradient.addColorStop(0.7, 'rgba(60, 120, 200, 0.18)');
      gradient.addColorStop(1, 'rgba(50, 110, 190, 0.25)');

      ctx.fillStyle = gradient;
      ctx.fillRect(0, height * 0.55, width, height * 0.45);
    }

    function drawReflection() {
      ctx.save();
      ctx.translate(0, height);
      ctx.scale(1, -0.45);
      ctx.globalAlpha = 0.28;

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        if (p.y > height - 480) {
          ctx.font = `${p.size}px monospace`;
          ctx.fillStyle = '#a0d0ff';
          ctx.fillText(p.char, p.x, p.y);
        }
      }
      ctx.restore();
    }

    function animate() {
      ctx.clearRect(0, 0, width, height);

      // Desenha o blur azul primeiro
      drawBlueBlur();

      // Cria letras da nuvem
      if (Math.random() < 0.29) {
        createRainFromCloud();
      }

      // Atualiza e desenha letras caindo
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.update();
        p.draw();

        if (p.y > height + 40) {
          particles.splice(i, 1);
        }
      }

      // Reflexo
      drawReflection();

      requestAnimationFrame(animate);
    }

    animate();

    // Clique na nuvem para rajada
    document.querySelector('.nuvem').addEventListener('click', () => {
      for (let i = 0; i < 15; i++) {
        setTimeout(() => createRainFromCloud(), i * 60);
      }
    });
  </script>

</body>
</html>
